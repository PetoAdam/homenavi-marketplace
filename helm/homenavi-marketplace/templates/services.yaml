apiVersion: v1
kind: Service
metadata:
  name: {{ include "homenavi-marketplace.fullname" . }}-db
  labels:
    {{- include "homenavi-marketplace.labels" . | nindent 4 }}
    app.kubernetes.io/component: db
spec:
  type: ClusterIP
  selector:
    {{- include "homenavi-marketplace.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: db
  ports:
    - name: postgres
      port: {{ .Values.database.service.port }}
      targetPort: postgres
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "homenavi-marketplace.fullname" . }}-api
  labels:
    {{- include "homenavi-marketplace.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    {{- include "homenavi-marketplace.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "homenavi-marketplace.fullname" . }}-web
  labels:
    {{- include "homenavi-marketplace.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: ClusterIP
  selector:
    {{- include "homenavi-marketplace.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
      protocol: TCP
---
{{- if .Values.nginx.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "homenavi-marketplace.fullname" . }}
  labels:
    {{- include "homenavi-marketplace.labels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
spec:
  type: {{ .Values.nginx.service.type }}
  selector:
    {{- include "homenavi-marketplace.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: {{ .Values.nginx.service.port }}
      targetPort: http
      protocol: TCP
{{- end }}
