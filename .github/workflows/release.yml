name: Release Marketplace Images

"on":
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to release (e.g. v0.1.0)
        required: true
        type: string

permissions:
  contents: write
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute registry owner
        id: owner
        run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build API image for scan (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          load: true
          platforms: linux/amd64
          tags: homenavi-marketplace-api:scan

      - name: Build Web image for scan (amd64)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          load: true
          platforms: linux/amd64
          tags: homenavi-marketplace-web:scan

      - name: Scan API image (fail on HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.55.2 image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            homenavi-marketplace-api:scan

      - name: Scan Web image (fail on HIGH/CRITICAL)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.55.2 image \
            --scanners vuln \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            homenavi-marketplace-web:scan

      - name: Build and push API image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lower }}/homenavi-marketplace-api:${{ env.TAG_NAME }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lower }}/homenavi-marketplace-api:latest

      - name: Build and push Web image (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: ./web
          file: ./web/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lower }}/homenavi-marketplace-web:${{ env.TAG_NAME }}
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.owner_lower }}/homenavi-marketplace-web:latest

      - name: Check if release already exists
        id: check_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.TAG_NAME;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Release for tag ${tag} already exists.`);
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.info(`No release found for tag ${tag}.`);
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Release already exists
        if: steps.check_release.outputs.exists == 'true'
        run: echo "Release for ${TAG_NAME} already exists. Skipping creation."

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true
